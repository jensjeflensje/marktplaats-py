name: Update categories

on:
  schedule:
    - cron: 0 4 * * 1
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-categories:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Run update_categories.py
        run: uv run python -m scripts.update_categories

      - name: Run gen_categories_readme.py
        run: uv run python -m scripts.gen_categories_readme

      - name: Create Pull Request
        run: |
          branch_name="update-categories"
          commit_msg="Update categories"
          body="Automated weekly category update."
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch --create "$branch_name"
          git add .
          git commit -m "$commit_msg" || exit 0
          git remote set-url origin "https://x-access-token:$GH_TOKEN@github.com/$repository"
          git push -u origin "$branch_name" --force

          gh pr create --title "$commit_msg" --body "$body"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
