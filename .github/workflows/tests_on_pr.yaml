name: Run tests

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  define-matrix:
    name: Define Python version matrix
    runs-on: ubuntu-latest
    outputs:
      python_versions_output: ${{ steps.set-matrix.outputs.python_versions }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true

      - id: set-matrix
        shell: python
        run: |
          import json
          import subprocess
          import sys
          import tomllib
          from os import environ
          from subprocess import run

          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)

          python_versions = []
          python_implementations = []

          for classifier in data.get("project", {}).get("classifiers", []):
              c = classifier.split(" :: ")
              match c:
                  case ["Programming Language", "Python", version]:
                      python_versions.append(list(map(int, version.split("."))))
                  case ["Programming Language", "Python", "Implementation", implementation]:
                      python_implementations.append(implementation.lower())

          available = json.loads(
              run(
                  ["uv", "python", "list", "--output-format=json"],
                  check=True,
                  stdout=subprocess.PIPE,
              ).stdout
          )

          requests = [
              f"{impl}-{major}.{minor}"
              for impl in python_implementations
              for major, minor in python_versions
              if any(
                  x["implementation"] == impl
                  and x["version_parts"]["major"] == major
                  and x["version_parts"]["minor"] == minor
                  for x in available
              )
          ]

          if not requests:
              print("No matching Python versions found")
              sys.exit(1)

          print(f"Requests: {", ".join(requests)}")
          with open(environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"python_versions={json.dumps(requests)}\n")


  test:
    name: Run tests
    runs-on: ubuntu-latest
    needs: define-matrix
    strategy:
      matrix:
        python-version: ${{ fromJson(needs.define-matrix.outputs.python_versions_output) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true

      - name: Pin Python version to ${{ matrix.python-version }}
        run: uv python pin "${PYTHON_VERSION}"
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}

      - name: Run tests
        run: uv run pytest
